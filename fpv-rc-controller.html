<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FPV RC Car</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    touch-action: none;
    background: #0a0a0a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  #app {
    position: fixed;
    inset: 0;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    display: grid;
    grid-template-columns: clamp(72px, 20vw, 120px) 1fr clamp(72px, 20vw, 120px);
    gap: clamp(6px, 2vw, 16px);
    padding: clamp(8px, 2vw, 16px);
    align-items: center;
    background: #0a0a0a;
    color: #fff;
  }

  /* ── Side panels ── */
  .side {
    display: flex;
    flex-direction: column;
    gap: clamp(8px, 3vh, 20px);
    align-items: center;
    justify-content: center;
    height: 100%;
  }

  .ctrl-btn {
    width: clamp(68px, 18vw, 115px);
    height: clamp(68px, 18vw, 115px);
    background: #161616;
    border: 0.5px solid #2a2a2a;
    border-radius: clamp(10px, 2.5vw, 18px);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background .07s, transform .07s, border-color .07s;
    user-select: none;
    touch-action: none;
  }
  .ctrl-btn svg {
    width: clamp(26px, 6vw, 42px);
    height: clamp(26px, 6vw, 42px);
    stroke: #4a4a4a;
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke .07s;
  }
  .ctrl-btn.pressed { background: #1f1f1f; transform: scale(0.91); border-color: #3a3a3a; }
  .ctrl-btn.fwd.pressed svg  { stroke: #1D9E75; }
  .ctrl-btn.bwd.pressed svg  { stroke: #e24b4a; }
  .ctrl-btn.lft.pressed svg,
  .ctrl-btn.rgt.pressed svg  { stroke: #378ADD; }

  /* ── Center ── */
  #center {
    display: flex;
    flex-direction: column;
    gap: clamp(5px, 1.5vh, 10px);
    height: 100%;
    justify-content: center;
  }

  #cam-feed {
    flex: 1;
    min-height: 0;
    background: #0f0f0f;
    border-radius: clamp(6px, 1.5vw, 12px);
    border: 0.5px solid #1e1e1e;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  #cam-feed img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: none;
  }
  #cam-placeholder {
    display: flex; flex-direction: column;
    align-items: center; gap: 8px;
  }
  #cam-placeholder svg {
    width: clamp(24px, 5vw, 36px);
    height: clamp(24px, 5vw, 36px);
    stroke: #333; fill: none;
  }
  #cam-placeholder span {
    font-size: clamp(10px, 1.5vw, 13px);
    color: #333;
  }

  #hud {
    position: absolute;
    top: 8px; left: 8px; right: 8px;
    display: flex; justify-content: space-between; align-items: center;
    pointer-events: none;
  }
  .badge {
    font-size: clamp(9px, 1.2vw, 11px);
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
  }
  .b-off  { background: #1a0808; color: #e24b4a; border: 0.5px solid #5a1a1a; }
  .b-on   { background: #081a10; color: #1D9E75; border: 0.5px solid #0d5e3a; }
  .b-ping { background: #0e0e1c; color: #7F77DD; border: 0.5px solid #322d7a; font-variant-numeric: tabular-nums; }

  /* ── Bottom bar ── */
  #bottom {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  #ip-input {
    flex: 1; min-width: 0;
    background: #111;
    border: 0.5px solid #2a2a2a;
    border-radius: 7px;
    color: #aaa;
    font-size: clamp(10px, 1.4vw, 13px);
    padding: 6px 9px;
    outline: none;
  }
  #ip-input:focus { border-color: #444; }
  #connect-btn {
    padding: 6px 12px;
    border-radius: 7px;
    border: 0.5px solid #2a2a2a;
    background: #161616;
    color: #888;
    font-size: clamp(10px, 1.4vw, 13px);
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background .1s;
  }
  #connect-btn.on { border-color: #0d5e3a; color: #1D9E75; background: #081a10; }
  #cmd-label {
    font-size: clamp(9px, 1.3vw, 12px);
    color: #3a3a3a;
    white-space: nowrap;
    flex-shrink: 0;
    min-width: 52px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>
<div id="app">

  <!-- Kiri: maju & mundur -->
  <div class="side">
    <div class="ctrl-btn fwd" data-cmd="FORWARD">
      <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
    </div>
    <div class="ctrl-btn bwd" data-cmd="BACKWARD">
      <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
  </div>

  <!-- Tengah: kamera + kontrol -->
  <div id="center">
    <div id="cam-feed">
      <img id="cam-img" alt="live stream">
      <div id="cam-placeholder">
        <svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="14" rx="2"/><circle cx="12" cy="13" r="3"/><path d="M7 6V4h4v2"/></svg>
        <span>Kamera offline</span>
      </div>
      <div id="hud">
        <span class="badge b-off" id="conn-badge">Terputus</span>
        <span class="badge b-ping" id="ping-badge">-- ms</span>
      </div>
    </div>
    <div id="bottom">
      <input type="text" id="ip-input" value="192.168.4.1" placeholder="IP ESP32">
      <button id="connect-btn" onclick="toggleConnect()">Connect</button>
      <span id="cmd-label">STOP</span>
    </div>
  </div>

  <!-- Kanan: kiri & kanan -->
  <div class="side">
    <div class="ctrl-btn lft" data-cmd="LEFT">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </div>
    <div class="ctrl-btn rgt" data-cmd="RIGHT">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
  </div>

</div>

<script>
  // Block scroll & zoom
  document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
  document.addEventListener('touchstart', e => { if (e.target.id !== 'ip-input') e.preventDefault(); }, { passive: false });
  document.addEventListener('gesturestart', e => e.preventDefault());

  let ws = null, connected = false, pingTimer = null, pingStart = 0;

  function setCmd(cmd) {
    document.getElementById('cmd-label').textContent = cmd;
    if (connected && ws && ws.readyState === 1) {
      ws.send(JSON.stringify({ cmd }));
    }
  }

  function toggleConnect() {
    if (connected) { ws.close(); return; }
    const ip = document.getElementById('ip-input').value.trim();
    try {
      ws = new WebSocket('ws://' + ip + '/ws');
    } catch(e) { return; }

    ws.onopen = () => {
      connected = true;
      document.getElementById('conn-badge').textContent = 'Live';
      document.getElementById('conn-badge').className = 'badge b-on';
      document.getElementById('connect-btn').textContent = 'Putus';
      document.getElementById('connect-btn').className = 'on';
      const camImg = document.getElementById('cam-img');
      camImg.src = 'http://' + ip + ':81/stream';
      camImg.style.display = 'block';
      document.getElementById('cam-placeholder').style.display = 'none';
      pingTimer = setInterval(() => {
        if (ws.readyState === 1) { pingStart = Date.now(); ws.send(JSON.stringify({ cmd: 'PING' })); }
      }, 2000);
    };

    ws.onmessage = e => {
      try {
        const d = JSON.parse(e.data);
        if (d.type === 'PONG') document.getElementById('ping-badge').textContent = (Date.now() - pingStart) + ' ms';
      } catch(_) {}
    };

    ws.onclose = () => {
      connected = false;
      clearInterval(pingTimer);
      document.getElementById('conn-badge').textContent = 'Terputus';
      document.getElementById('conn-badge').className = 'badge b-off';
      document.getElementById('connect-btn').textContent = 'Connect';
      document.getElementById('connect-btn').className = '';
      document.getElementById('ping-badge').textContent = '-- ms';
      document.getElementById('cam-img').style.display = 'none';
      document.getElementById('cam-placeholder').style.display = 'flex';
      setCmd('STOP');
    };
  }

  // Tombol touch & mouse
  document.querySelectorAll('.ctrl-btn').forEach(btn => {
    const cmd = btn.dataset.cmd;
    const press   = () => { btn.classList.add('pressed'); setCmd(cmd); };
    const release = () => { btn.classList.remove('pressed'); setCmd('STOP'); };
    btn.addEventListener('mousedown',   press);
    btn.addEventListener('mouseup',     release);
    btn.addEventListener('mouseleave',  release);
    btn.addEventListener('touchstart',  e => { e.preventDefault(); press(); },   { passive: false });
    btn.addEventListener('touchend',    e => { e.preventDefault(); release(); }, { passive: false });
    btn.addEventListener('touchcancel', e => { e.preventDefault(); release(); }, { passive: false });
  });

  // Keyboard
  const keyMap = { ArrowUp:'FORWARD', ArrowDown:'BACKWARD', ArrowLeft:'LEFT', ArrowRight:'RIGHT', w:'FORWARD', s:'BACKWARD', a:'LEFT', d:'RIGHT' };
  const btnByCmd = { FORWARD:'fwd', BACKWARD:'bwd', LEFT:'lft', RIGHT:'rgt' };
  const held = new Set();

  document.addEventListener('keydown', e => {
    const cmd = keyMap[e.key];
    if (!cmd || held.has(e.key)) return;
    held.add(e.key);
    document.querySelector('.ctrl-btn.' + btnByCmd[cmd])?.classList.add('pressed');
    setCmd(cmd);
  });
  document.addEventListener('keyup', e => {
    const cmd = keyMap[e.key];
    if (!cmd) return;
    held.delete(e.key);
    document.querySelector('.ctrl-btn.' + btnByCmd[cmd])?.classList.remove('pressed');
    setCmd('STOP');
  });
</script>
</body>
</html>
