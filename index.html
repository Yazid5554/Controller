<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FPV RC Car</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    touch-action: none;
    background: #0a0a0a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  #app {
    position: fixed;
    inset: 0;
    display: grid;
    grid-template-columns: clamp(72px, 20vw, 120px) 1fr clamp(72px, 20vw, 120px);
    gap: clamp(6px, 2vw, 16px);
    padding: clamp(8px, 2vw, 16px);
    align-items: center;
    background: #0a0a0a;
    color: #fff;
  }

  .side {
    display: flex;
    flex-direction: column;
    gap: clamp(8px, 3vh, 20px);
    align-items: center;
    justify-content: center;
    height: 100%;
  }

  .ctrl-btn {
    width: clamp(68px, 18vw, 115px);
    height: clamp(68px, 18vw, 115px);
    background: #161616;
    border: 1.5px solid #2a2a2a;
    border-radius: clamp(10px, 2.5vw, 18px);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background .08s, transform .08s, border-color .08s, box-shadow .08s;
    user-select: none;
    touch-action: none;
    -webkit-user-select: none;
    position: relative;
  }
  .ctrl-btn svg {
    width: clamp(26px, 6vw, 42px);
    height: clamp(26px, 6vw, 42px);
    stroke: #3a3a3a;
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke .08s, transform .08s;
  }

  /* ── Idle hover (desktop) ── */
  .ctrl-btn:hover { border-color: #3a3a3a; background: #1c1c1c; }
  .ctrl-btn:hover svg { stroke: #666; }

  /* ── MAJU — hijau ── */
  .ctrl-btn.fwd.pressed {
    background: #071a10;
    border-color: #1D9E75;
    box-shadow: 0 0 0 3px rgba(29,158,117,0.18), 0 0 16px rgba(29,158,117,0.22);
    transform: scale(0.92);
  }
  .ctrl-btn.fwd.pressed svg { stroke: #1D9E75; transform: scale(1.12); }

  /* ── MUNDUR — merah ── */
  .ctrl-btn.bwd.pressed {
    background: #1a0808;
    border-color: #e24b4a;
    box-shadow: 0 0 0 3px rgba(226,75,74,0.18), 0 0 16px rgba(226,75,74,0.22);
    transform: scale(0.92);
  }
  .ctrl-btn.bwd.pressed svg { stroke: #e24b4a; transform: scale(1.12); }

  /* ── KIRI / KANAN — biru ── */
  .ctrl-btn.lft.pressed,
  .ctrl-btn.rgt.pressed {
    background: #071018;
    border-color: #378ADD;
    box-shadow: 0 0 0 3px rgba(55,138,221,0.18), 0 0 16px rgba(55,138,221,0.22);
    transform: scale(0.92);
  }
  .ctrl-btn.lft.pressed svg,
  .ctrl-btn.rgt.pressed svg { stroke: #378ADD; transform: scale(1.12); }

  /* ── Kamera ── */
  #center {
    display: flex;
    flex-direction: column;
    gap: clamp(5px, 1.5vh, 10px);
    height: 100%;
    justify-content: center;
  }
  #cam-feed {
    flex: 1;
    min-height: 0;
    background: #0f0f0f;
    border-radius: clamp(6px, 1.5vw, 12px);
    border: 0.5px solid #1e1e1e;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  #cam-feed img { width: 100%; height: 100%; object-fit: cover; display: none; }
  #cam-placeholder { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  #cam-placeholder svg { width: clamp(24px,5vw,36px); height: clamp(24px,5vw,36px); stroke: #333; fill: none; }
  #cam-placeholder span { font-size: clamp(10px,1.5vw,13px); color: #333; }

  #hud {
    position: absolute;
    top: 8px; left: 8px; right: 8px;
    display: flex; justify-content: space-between; align-items: center;
    pointer-events: none;
  }
  .badge { font-size: clamp(9px,1.2vw,11px); padding: 2px 8px; border-radius: 20px; font-weight: 500; }
  .b-off  { background: #1a0808; color: #e24b4a; border: 0.5px solid #5a1a1a; }
  .b-on   { background: #081a10; color: #1D9E75; border: 0.5px solid #0d5e3a; }
  .b-ping { background: #0e0e1c; color: #7F77DD; border: 0.5px solid #322d7a; font-variant-numeric: tabular-nums; }

  /* ── Bottom bar ── */
  #bottom { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  #ip-input {
    flex: 1; min-width: 0;
    background: #111; border: 0.5px solid #2a2a2a; border-radius: 7px;
    color: #aaa; font-size: clamp(10px,1.4vw,13px); padding: 6px 9px; outline: none;
  }
  #ip-input:focus { border-color: #444; }
  #connect-btn {
    padding: 6px 12px; border-radius: 7px; border: 0.5px solid #2a2a2a;
    background: #161616; color: #888; font-size: clamp(10px,1.4vw,13px);
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
    transition: background .1s, color .1s, border-color .1s;
  }
  #connect-btn.on { border-color: #0d5e3a; color: #1D9E75; background: #081a10; }

  #cmd-pill {
    font-size: clamp(9px,1.3vw,12px); font-weight: 500;
    padding: 6px 10px; border-radius: 7px; border: 0.5px solid #2a2a2a;
    background: #111; color: #444; white-space: nowrap; flex-shrink: 0;
    min-width: clamp(48px,9vw,88px); text-align: center;
    transition: color .1s, border-color .1s; letter-spacing: 0.04em;
  }
  #cmd-pill.fwd   { color: #1D9E75; border-color: #0d5e3a; }
  #cmd-pill.bwd   { color: #e24b4a; border-color: #5a1a1a; }
  #cmd-pill.turn  { color: #378ADD; border-color: #1a3a6a; }
  #cmd-pill.combo { color: #EF9F27; border-color: #6a4a10; }
</style>
</head>
<body>
<div id="app">

  <div class="side">
    <div class="ctrl-btn fwd" data-key="fwd">
      <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
    </div>
    <div class="ctrl-btn bwd" data-key="bwd">
      <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
  </div>

  <div id="center">
    <div id="cam-feed">
      <img id="cam-img" alt="live stream">
      <div id="cam-placeholder">
        <svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="14" rx="2"/><circle cx="12" cy="13" r="3"/><path d="M7 6V4h4v2"/></svg>
        <span>Kamera offline</span>
      </div>
      <div id="hud">
        <span class="badge b-off" id="conn-badge">Terputus</span>
        <span class="badge b-ping" id="ping-badge">-- ms</span>
      </div>
    </div>
    <div id="bottom">
      <input type="text" id="ip-input" value="192.168.4.1" placeholder="IP ESP32">
      <button id="connect-btn" onclick="toggleConnect()">Connect</button>
      <span id="cmd-pill">STOP</span>
    </div>
  </div>

  <div class="side">
    <div class="ctrl-btn lft" data-key="lft">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </div>
    <div class="ctrl-btn rgt" data-key="rgt">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
  </div>

</div>
<script>
  document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
  document.addEventListener('touchstart', e => { if (e.target.id !== 'ip-input') e.preventDefault(); }, { passive: false });
  document.addEventListener('gesturestart', e => e.preventDefault());

  const pressed = { fwd: false, bwd: false, lft: false, rgt: false };

  function resolveCmd() {
    const { fwd, bwd, lft, rgt } = pressed;
    if (fwd && rgt) return { cmd: 'FWD_RIGHT',  label: 'MAJU+KANAN',   cls: 'combo' };
    if (fwd && lft) return { cmd: 'FWD_LEFT',   label: 'MAJU+KIRI',    cls: 'combo' };
    if (bwd && rgt) return { cmd: 'BWD_RIGHT',  label: 'MUNDUR+KANAN', cls: 'combo' };
    if (bwd && lft) return { cmd: 'BWD_LEFT',   label: 'MUNDUR+KIRI',  cls: 'combo' };
    if (fwd)        return { cmd: 'FORWARD',    label: 'MAJU',         cls: 'fwd'   };
    if (bwd)        return { cmd: 'BACKWARD',   label: 'MUNDUR',       cls: 'bwd'   };
    if (rgt)        return { cmd: 'RIGHT',      label: 'KANAN',        cls: 'turn'  };
    if (lft)        return { cmd: 'LEFT',       label: 'KIRI',         cls: 'turn'  };
    return           { cmd: 'STOP',      label: 'STOP',         cls: ''      };
  }

  let lastCmd = '';
  function update() {
    const r = resolveCmd();
    const pill = document.getElementById('cmd-pill');
    pill.textContent = r.label;
    pill.className = r.cls;
    if (r.cmd !== lastCmd) {
      lastCmd = r.cmd;
      if (connected && ws && ws.readyState === 1) ws.send(JSON.stringify({ cmd: r.cmd }));
    }
  }

  function setKey(key, val) {
    pressed[key] = val;
    document.querySelector('.ctrl-btn[data-key="' + key + '"]')?.classList.toggle('pressed', val);
    update();
  }

  document.querySelectorAll('.ctrl-btn').forEach(btn => {
    const key = btn.dataset.key;
    btn.addEventListener('mousedown',   () => setKey(key, true));
    btn.addEventListener('mouseup',     () => setKey(key, false));
    btn.addEventListener('mouseleave',  () => setKey(key, false));
    btn.addEventListener('touchstart',  e => { e.preventDefault(); setKey(key, true);  }, { passive: false });
    btn.addEventListener('touchend',    e => { e.preventDefault(); setKey(key, false); }, { passive: false });
    btn.addEventListener('touchcancel', e => { e.preventDefault(); setKey(key, false); }, { passive: false });
  });

  const keyMap = { ArrowUp:'fwd', ArrowDown:'bwd', ArrowLeft:'lft', ArrowRight:'rgt', w:'fwd', s:'bwd', a:'lft', d:'rgt' };
  document.addEventListener('keydown', e => { if (keyMap[e.key] && !pressed[keyMap[e.key]]) setKey(keyMap[e.key], true); });
  document.addEventListener('keyup',   e => { if (keyMap[e.key]) setKey(keyMap[e.key], false); });

  let ws = null, connected = false, pingTimer = null, pingStart = 0;

  function toggleConnect() {
    if (connected) { ws.close(); return; }
    const ip = document.getElementById('ip-input').value.trim();
    try { ws = new WebSocket('ws://' + ip + '/ws'); } catch(e) { return; }
    ws.onopen = () => {
      connected = true;
      document.getElementById('conn-badge').textContent = 'Live';
      document.getElementById('conn-badge').className = 'badge b-on';
      document.getElementById('connect-btn').textContent = 'Putus';
      document.getElementById('connect-btn').className = 'on';
      const img = document.getElementById('cam-img');
      img.src = 'http://' + ip + ':81/stream';
      img.style.display = 'block';
      document.getElementById('cam-placeholder').style.display = 'none';
      pingTimer = setInterval(() => {
        if (ws.readyState === 1) { pingStart = Date.now(); ws.send(JSON.stringify({ cmd: 'PING' })); }
      }, 2000);
    };
    ws.onmessage = e => {
      try { const d = JSON.parse(e.data); if (d.type === 'PONG') document.getElementById('ping-badge').textContent = (Date.now() - pingStart) + ' ms'; } catch(_) {}
    };
    ws.onclose = () => {
      connected = false; clearInterval(pingTimer);
      document.getElementById('conn-badge').textContent = 'Terputus';
      document.getElementById('conn-badge').className = 'badge b-off';
      document.getElementById('connect-btn').textContent = 'Connect';
      document.getElementById('connect-btn').className = '';
      document.getElementById('ping-badge').textContent = '-- ms';
      document.getElementById('cam-img').style.display = 'none';
      document.getElementById('cam-placeholder').style.display = 'flex';
      Object.keys(pressed).forEach(k => setKey(k, false));
    };
  }
</script>
</body>
</html>
